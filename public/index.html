<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocEx · 安全报告智能解析系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161b27;
      --surface2: #1e2534;
      --border: #2a3347;
      --accent: #4f80ff;
      --accent-dim: rgba(79,128,255,0.12);
      --accent-glow: rgba(79,128,255,0.25);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 40px 0 32px;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(79,128,255,0.3);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: var(--text-dim); font-size: 0.95rem; }

    /* ── Layout ── */
    .container { max-width: 1000px; margin: 0 auto; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Drop Zone ── */
    #dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }
    #dropzone:hover, #dropzone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    #dropzone .drop-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    #dropzone .drop-hint { color: var(--text-dim); font-size: 0.9rem; }
    #dropzone .drop-hint span { color: var(--accent); font-weight: 500; }
    #dropzone .drop-types {
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    #file-input { display: none; }

    #file-preview {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--green-dim);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: var(--radius-sm);
      margin-top: 12px;
    }
    #file-preview .file-icon { font-size: 1.4rem; }
    #file-preview .file-name { font-size: 0.9rem; font-weight: 500; color: var(--green); }
    #file-preview .file-size { font-size: 0.75rem; color: var(--text-muted); }
    #file-preview .remove-file {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    #file-preview .remove-file:hover { color: var(--red); }

    /* ── Input ── */
    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    input[type="text"], input[type="url"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input[type="text"]:focus, input[type="url"]:focus {
      border-color: var(--accent);
    }
    .file-id-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(79,128,255,0.3);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-family: monospace;
      white-space: nowrap;
    }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      outline: none;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: #6b9aff; transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-success {
      background: var(--green);
      color: white;
    }
    .btn-success:hover { background: #34d468; transform: translateY(-1px); }
    .btn-success:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Progress ── */
    #progress-section { display: none; }
    .progress-steps {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .progress-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      position: relative;
    }
    .progress-step::after {
      content: '';
      position: absolute;
      top: 14px;
      left: calc(50% + 16px);
      right: calc(-50% + 16px);
      height: 2px;
      background: var(--border);
      transition: background 0.4s;
    }
    .progress-step:last-child::after { display: none; }
    .progress-step.active::after, .progress-step.done::after { background: var(--accent); }

    .step-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: all 0.3s;
      position: relative;
      z-index: 1;
    }
    .progress-step.active .step-dot {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .progress-step.done .step-dot {
      border-color: var(--green);
      background: var(--green-dim);
      color: var(--green);
    }
    .step-label { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }
    .progress-step.active .step-label { color: var(--accent); font-weight: 600; }
    .progress-step.done .step-label { color: var(--green); }

    .progress-bar-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #818cf8);
      border-radius: 99px;
      transition: width 0.5s ease;
      width: 0%;
    }
    .progress-status {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── Token Usage ── */
    .token-usage {
      display: inline-flex;
      gap: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 0.8rem;
    }
    .token-item { display: flex; flex-direction: column; gap: 2px; }
    .token-label { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; }
    .token-val { color: var(--text); font-weight: 600; }

    /* ── Results Table ── */
    #results-section { display: none; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: gap;
      gap: 12px;
    }
    .results-count {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      background: var(--accent-dim);
      border: 1px solid rgba(79,128,255,0.3);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 99px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      background: var(--surface2);
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td {
      padding: 10px 14px;
      vertical-align: top;
      min-width: 100px;
    }
    td[contenteditable="true"] {
      outline: none;
      border-radius: 4px;
    }
    td[contenteditable="true"]:focus {
      background: var(--accent-dim);
      box-shadow: 0 0 0 2px var(--accent);
    }
    .td-actions { min-width: 40px; text-align: center; }
    .delete-row {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all 0.15s;
      font-size: 1rem;
    }
    .delete-row:hover { color: var(--red); background: var(--red-dim); }

    /* ── Field mapping warning ── */
    .mapping-warn {
      display: none;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--yellow);
      margin-bottom: 16px;
    }

    /* ── Push result ── */
    .push-result {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 16px;
    }
    .push-result.success {
      background: var(--green-dim);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--green);
    }
    .push-result.error {
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body { padding: 12px; }
      .header h1 { font-size: 1.6rem; }
      .results-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-badge">🤖 Powered by MiMo-V2.5</div>
    <h1>DocEx 安全报告解析</h1>
    <p>上传安全检查报告，自动提取隐患信息并推送至 WPS 多维表格</p>
  </div>

  <!-- Step 1: Upload -->
  <div class="card">
    <div class="card-title">
      <span class="step-num">1</span>
      上传文档
    </div>
    <div id="dropzone">
      <div class="drop-icon">📄</div>
      <div class="drop-hint">拖拽文件至此，或 <span>点击选择</span></div>
      <div class="drop-types">支持格式：PDF · DOCX · 最大 50MB</div>
    </div>
    <input type="file" id="file-input" accept=".pdf,.docx">
    <div id="file-preview">
      <div class="file-icon" id="preview-icon">📄</div>
      <div>
        <div class="file-name" id="preview-name">文件名.pdf</div>
        <div class="file-size" id="preview-size">0 KB</div>
      </div>
      <button class="remove-file" id="remove-file" title="移除文件">✕</button>
    </div>
  </div>

  <!-- Step 2: WPS Link -->
  <div class="card">
    <div class="card-title">
      <span class="step-num">2</span>
      WPS 多维表格链接
    </div>
    <div class="input-group">
      <label>分享链接（系统会自动提取 FileId）</label>
      <div class="input-row">
        <input type="url" id="wps-url"
          value="https://365.kdocs.cn/l/cbGbLglUXASe?R=L1MvMQ=="
          placeholder="https://365.kdocs.cn/l/xxxxxxxxxx">
        <div class="file-id-badge" id="file-id-badge">
          🔑 <span id="file-id-text"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Start Button -->
  <div style="text-align:center;margin-bottom:20px;">
    <button class="btn btn-primary" id="start-btn" style="min-width:180px;" disabled>
      🚀 开始解析
    </button>
  </div>

  <!-- Progress -->
  <div class="card" id="progress-section">
    <div class="card-title">解析进度</div>
    <div class="progress-steps">
      <div class="progress-step" id="ps-upload">
        <div class="step-dot" id="pd-upload">1</div>
        <div class="step-label">上传文件</div>
      </div>
      <div class="progress-step" id="ps-extract">
        <div class="step-dot" id="pd-extract">2</div>
        <div class="step-label">文档提取</div>
      </div>
      <div class="progress-step" id="ps-llm">
        <div class="step-dot" id="pd-llm">3</div>
        <div class="step-label">模型识别</div>
      </div>
      <div class="progress-step" id="ps-done">
        <div class="step-dot" id="pd-done">✓</div>
        <div class="step-label">完成</div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="progress-status" id="progress-status">准备就绪</div>
  </div>

  <!-- Results -->
  <div class="card" id="results-section">
    <div class="results-header">
      <div class="results-count">
        <span style="font-size:1rem;font-weight:600;">识别结果</span>
        <span class="badge" id="issue-count">0 条</span>
      </div>
      <div id="token-usage-wrap"></div>
    </div>

    <div class="mapping-warn" id="mapping-warn">
      ⚠️ <span id="mapping-warn-text"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>项目名称</th>
            <th>问题类型</th>
            <th>检查区域</th>
            <th>问题描述</th>
            <th>整改要求</th>
            <th>检查人员</th>
            <th>检查日期</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="issues-tbody"></tbody>
      </table>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-top:20px;gap:12px;align-items:center;">
      <button class="btn btn-ghost" id="add-row-btn">＋ 新增行</button>
      <button class="btn btn-success" id="push-btn">
        📤 推送到 WPS 多维表格
      </button>
    </div>

    <div class="push-result" id="push-result"></div>
  </div>
</div>

<script>
  // ── State ──
  let currentFile = null;
  let currentFileId = '';
  let currentIssues = [];
  let schemaFields = [];

  // ── DOM refs ──
  const dropzone     = document.getElementById('dropzone');
  const fileInput    = document.getElementById('file-input');
  const filePreview  = document.getElementById('file-preview');
  const previewIcon  = document.getElementById('preview-icon');
  const previewName  = document.getElementById('preview-name');
  const previewSize  = document.getElementById('preview-size');
  const removeFile   = document.getElementById('remove-file');
  const wpsUrl       = document.getElementById('wps-url');
  const fileIdBadge  = document.getElementById('file-id-badge');
  const fileIdText   = document.getElementById('file-id-text');
  const startBtn     = document.getElementById('start-btn');
  const progressSec  = document.getElementById('progress-section');
  const progressBar  = document.getElementById('progress-bar');
  const progressStat = document.getElementById('progress-status');
  const resultsSec   = document.getElementById('results-section');
  const issueCount   = document.getElementById('issue-count');
  const issuesTbody  = document.getElementById('issues-tbody');
  const pushBtn      = document.getElementById('push-btn');
  const pushResult   = document.getElementById('push-result');
  const tokenWrap    = document.getElementById('token-usage-wrap');
  const mappingWarn  = document.getElementById('mapping-warn');
  const mappingWarnText = document.getElementById('mapping-warn-text');

  // ── Parse fileId from URL ──
  function parseFileId(url) {
    const match = url.match(/\/l\/([^?#/]+)/);
    return match ? match[1] : url.trim();
  }

  function updateFileIdBadge() {
    const url = wpsUrl.value.trim();
    if (url) {
      const fid = parseFileId(url);
      currentFileId = fid;
      fileIdText.textContent = fid;
      fileIdBadge.style.display = 'flex';
    } else {
      fileIdBadge.style.display = 'none';
      currentFileId = '';
    }
    updateStartBtn();
  }

  wpsUrl.addEventListener('input', updateFileIdBadge);
  updateFileIdBadge();

  // ── File handling ──
  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function setFile(file) {
    if (!file) return;
    const ext = file.name.toLowerCase().split('.').pop();
    if (!['pdf', 'docx'].includes(ext)) {
      alert('仅支持 PDF 和 DOCX 格式');
      return;
    }
    currentFile = file;
    previewIcon.textContent = ext === 'pdf' ? '📕' : '📘';
    previewName.textContent = file.name;
    previewSize.textContent = formatSize(file.size);
    filePreview.style.display = 'flex';
    dropzone.style.display = 'none';
    updateStartBtn();
  }

  function clearFile() {
    currentFile = null;
    fileInput.value = '';
    filePreview.style.display = 'none';
    dropzone.style.display = '';
    updateStartBtn();
  }

  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => setFile(e.target.files[0]));
  removeFile.addEventListener('click', clearFile);

  dropzone.addEventListener('dragover', e => {
    e.preventDefault();
    dropzone.classList.add('drag-over');
  });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    setFile(e.dataTransfer.files[0]);
  });

  // ── Button state ──
  function updateStartBtn() {
    startBtn.disabled = !(currentFile && currentFileId);
  }

  // ── Progress helpers ──
  const steps = ['upload', 'extract', 'llm', 'done'];
  function setProgress(stepName, percent, status) {
    progressBar.style.width = percent + '%';
    progressStat.textContent = status;
    const idx = steps.indexOf(stepName);
    steps.forEach((s, i) => {
      const ps = document.getElementById('ps-' + s);
      const pd = document.getElementById('pd-' + s);
      ps.classList.remove('active', 'done');
      if (i < idx) { ps.classList.add('done'); pd.textContent = '✓'; }
      else if (i === idx) { ps.classList.add('active'); }
    });
  }

  // ── Render table ──
  const FIELDS = [
    { key: 'projectName',            label: '项目名称' },
    { key: 'issueType',              label: '问题类型' },
    { key: 'inspectionArea',         label: '检查区域' },
    { key: 'description',            label: '问题描述' },
    { key: 'rectificationRequirement', label: '整改要求' },
    { key: 'inspector',              label: '检查人员' },
    { key: 'inspectionDate',         label: '检查日期' },
  ];

  function renderTable(issues) {
    issuesTbody.innerHTML = '';
    issues.forEach((issue, idx) => {
      const tr = document.createElement('tr');
      tr.dataset.idx = idx;

      // Row number
      const tdNum = document.createElement('td');
      tdNum.textContent = idx + 1;
      tdNum.style.color = 'var(--text-muted)';
      tdNum.style.fontSize = '0.75rem';
      tr.appendChild(tdNum);

      // Editable fields
      FIELDS.forEach(f => {
        const td = document.createElement('td');
        td.contentEditable = 'true';
        td.textContent = issue[f.key] ?? '';
        td.dataset.key = f.key;
        td.title = '点击编辑';
        td.addEventListener('blur', () => {
          currentIssues[idx][f.key] = td.textContent.trim();
        });
        tr.appendChild(td);
      });

      // Delete button
      const tdAct = document.createElement('td');
      tdAct.className = 'td-actions';
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-row';
      delBtn.innerHTML = '🗑';
      delBtn.title = '删除此行';
      delBtn.addEventListener('click', () => {
        currentIssues.splice(idx, 1);
        renderTable(currentIssues);
        issueCount.textContent = currentIssues.length + ' 条';
      });
      tdAct.appendChild(delBtn);
      tr.appendChild(tdAct);

      issuesTbody.appendChild(tr);
    });
  }

  // ── Add row ──
  document.getElementById('add-row-btn').addEventListener('click', () => {
    const blank = { projectName: '', issueType: '', inspectionArea: '', description: '', rectificationRequirement: '', inspector: '', inspectionDate: '' };
    currentIssues.push(blank);
    renderTable(currentIssues);
    issueCount.textContent = currentIssues.length + ' 条';
    // Scroll to bottom
    resultsSec.scrollIntoView({ behavior: 'smooth', block: 'end' });
  });

  // ── Token usage display ──
  function renderTokenUsage(usage) {
    if (!usage) { tokenWrap.innerHTML = ''; return; }
    tokenWrap.innerHTML = `
      <div class="token-usage">
        <div class="token-item"><div class="token-label">输入 Token</div><div class="token-val">${usage.promptTokens?.toLocaleString() ?? '-'}</div></div>
        <div class="token-item"><div class="token-label">输出 Token</div><div class="token-val">${usage.completionTokens?.toLocaleString() ?? '-'}</div></div>
        <div class="token-item"><div class="token-label">合计</div><div class="token-val">${usage.totalTokens?.toLocaleString() ?? '-'}</div></div>
      </div>`;
  }

  // ── Schema field mapping check ──
  function checkFieldMapping(fields) {
    if (!fields || fields.length === 0) return;
    const wpsNames = fields.map(f => f.name);
    const expected = ['项目名称', '问题类型', '检查区域', '问题描述', '整改要求', '检查人员', '检查日期'];
    const missing = expected.filter(e => !wpsNames.some(n => n.includes(e.slice(0, 2)) || e.includes(n.slice(0, 2))));
    if (missing.length > 0) {
      mappingWarnText.textContent = `以下字段未在 WPS 表头中找到精确匹配，将尝试模糊匹配：${missing.join('、')}。推送失败时请检查 WPS 表头是否正确。`;
      mappingWarn.style.display = 'block';
    } else {
      mappingWarn.style.display = 'none';
    }
  }

  // ── Main upload flow ──
  startBtn.addEventListener('click', async () => {
    if (!currentFile || !currentFileId) return;

    // Reset
    resultsSec.style.display = 'none';
    pushResult.style.display = 'none';
    progressSec.style.display = 'block';
    startBtn.disabled = true;
    startBtn.innerHTML = '<span class="spinner"></span> 解析中...';

    try {
      setProgress('upload', 15, '正在上传文件...');

      const fd = new FormData();
      fd.append('file', currentFile);
      fd.append('fileId', currentFileId);

      setProgress('extract', 35, '正在提取文档内容（PDF/DOCX 多模态解析）...');

      const resp = await fetch('/api/upload', { method: 'POST', body: fd });
      const data = await resp.json();

      if (!resp.ok) throw new Error(data.error || '服务器错误');

      setProgress('llm', 75, '模型正在识别安全隐患...');
      // Simulate slight delay so users see the LLM step
      await new Promise(r => setTimeout(r, 600));

      setProgress('done', 100, `✅ 识别完成，共发现 ${data.issues.length} 条隐患`);
      steps.forEach(s => {
        document.getElementById('ps-' + s).classList.remove('active');
        document.getElementById('ps-' + s).classList.add('done');
        document.getElementById('pd-' + s).textContent = '✓';
      });

      currentIssues = data.issues;
      schemaFields = data.schemaFields || [];

      issueCount.textContent = currentIssues.length + ' 条';
      renderTable(currentIssues);
      renderTokenUsage(data.tokenUsage);
      checkFieldMapping(schemaFields);

      resultsSec.style.display = 'block';
      resultsSec.scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
      progressStat.textContent = '❌ 错误：' + err.message;
      progressBar.style.background = 'var(--red)';
      console.error(err);
    } finally {
      startBtn.disabled = false;
      startBtn.innerHTML = '🚀 重新解析';
    }
  });

  // ── Push to WPS ──
  pushBtn.addEventListener('click', async () => {
    if (currentIssues.length === 0) {
      alert('没有需要推送的数据');
      return;
    }

    pushBtn.disabled = true;
    pushBtn.innerHTML = '<span class="spinner"></span> 推送中...';
    pushResult.style.display = 'none';

    try {
      const resp = await fetch('/api/push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fileId: currentFileId,
          issues: currentIssues,
          fieldMapping: null // 后端自动推断
        })
      });
      const data = await resp.json();

      if (!resp.ok) throw new Error(data.error || '推送失败');

      pushResult.className = 'push-result success';
      pushResult.innerHTML = `✅ 成功推送 ${data.insertedCount} 条记录到 WPS 多维表格！`;
      pushResult.style.display = 'flex';
    } catch (err) {
      pushResult.className = 'push-result error';
      pushResult.innerHTML = `❌ 推送失败：${err.message}`;
      pushResult.style.display = 'flex';
    } finally {
      pushBtn.disabled = false;
      pushBtn.innerHTML = '📤 推送到 WPS 多维表格';
    }
  });
</script>
</body>
</html>
