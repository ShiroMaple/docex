name: Deploy docex to Server

on:
  push:
    branches:
      - main # 当 main 分支有代码推送时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # 4. 设置 pnpm 依赖缓存
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 5. 安装依赖并编译打包
      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # 6. 整合 Standalone 产物并压缩
      # 增加了对 public 目录存在性的安全判断，防止空项目报错
      - name: Package Artifacts
        run: |
          [ -d public ] && cp -r public .next/standalone/public || echo "No public folder found"
          cp -r .next/static .next/standalone/.next/static
          cp ecosystem.config.cjs .next/standalone/ecosystem.config.cjs
          cd .next/standalone
          tar -czf ../../release.tar.gz .
      
      # 【新增步骤】在 GitHub 虚拟环境中尝试热启动，捕获依赖缺失错误
      - name: Smoke Test Standalone Build
        run: |
          # 1. 在后台启动 standalone 服务
          PORT=3000 node .next/standalone/server.js &
          SERVER_PID=$!
          
          # 2. 等待 3 秒让服务充分初始化
          sleep 3
          
          # 3. 尝试向服务发送请求，如果报错（如找不到模块），curl 会返回非0状态码，导致工作流直接中断报错
          curl -I http://localhost:3000 || (echo "❌ Standalone 启动失败，可能存在缺失的依赖！" && kill $SERVER_PID && exit 1)
          
          # 4. 测试成功，关闭后台进程
          kill $SERVER_PID
          echo "✅ Standalone 烟雾测试通过，可以安全发布！"      

      # 7. 将压缩包发送至服务器的 /var/www/docex
      - name: Copy Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 29922
          source: "release.tar.gz"
          target: "/var/www/docex"

      # 8. 远程解压并通知 PM2 重载
      - name: Deploy and Restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 29922
          script: |
            cd /var/www/docex
            # 解压并覆盖旧文件，随后清理压缩包
            tar -xzf release.tar.gz --overwrite
            rm release.tar.gz
            # 使用 PM2 零停机热重载，如果首次运行则执行 start
            pm2 reload ecosystem.config.cjs || pm2 start ecosystem.config.cjs
